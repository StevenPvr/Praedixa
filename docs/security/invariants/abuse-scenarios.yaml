version: 2
abuse_scenarios:
  - id: ABUSE-TS-001
    title: Token forge avec claims incomplets
    description: Un token mal forme ou incomplet ne doit jamais passer l'auth.
    required_tests:
      - app-api-ts/src/__tests__/auth.test.ts

  - id: ABUSE-TS-002
    title: Escalade de role sur endpoints admin
    description: Un role non super_admin ne doit pas acceder aux routes /api/v1/admin/*.
    required_tests:
      - app-api-ts/src/__tests__/server.test.ts
