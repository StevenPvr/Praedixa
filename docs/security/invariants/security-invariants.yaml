version: 3
invariants:
  - id: INV-TS-TENANT-001
    statement: Un utilisateur ne lit/modifie jamais les ressources d'une autre organisation.
    critical_paths:
      - app-api-ts/src/auth.ts
      - app-api-ts/src/routes.ts
      - contracts/openapi/public.yaml
    required_tests:
      - app-api-ts/src/__tests__/auth.test.ts

  - id: INV-TS-ROLE-002
    statement: Les routes admin restent reservees au role super_admin.
    critical_paths:
      - app-api-ts/src/auth.ts
      - app-api-ts/src/routes.ts
      - app-admin/lib/auth/**
      - app-webapp/lib/auth/**
    required_tests:
      - app-api-ts/src/__tests__/server.test.ts

  - id: INV-TS-CONTRACT-003
    statement: Le contrat OpenAPI public reste coherent avec le routage API TS.
    critical_paths:
      - app-api-ts/src/routes.ts
      - contracts/openapi/public.yaml
    required_tests:
      - app-api-ts/src/__tests__/auth.test.ts

  - id: INV-TS-HEADERS-004
    statement: Les en-tetes de securite HTTP restent actives sur toutes les reponses API.
    critical_paths:
      - app-api-ts/src/server.ts
      - scripts/check-prod-security-config.py
    required_tests:
      - app-api-ts/src/__tests__/server.test.ts

  - id: INV-CONNECTORS-AUTH-005
    statement: Le runtime connecteurs refuse toute route protegee sans token interne valide.
    critical_paths:
      - app-connectors/src/server.ts
      - app-connectors/src/security.ts
      - app-connectors/src/routes.ts
    required_tests:
      - app-connectors/src/__tests__/server.test.ts

  - id: INV-CONNECTORS-PAYLOAD-006
    statement: Les endpoints mutateurs des connecteurs acceptent uniquement du JSON valide et borne.
    critical_paths:
      - app-connectors/src/server.ts
      - app-connectors/src/routes.ts
    required_tests:
      - app-connectors/src/__tests__/server.test.ts
