sonar.projectKey=praedixa
sonar.projectName=praedixa
sonar.sources=.
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/.venv/**,**/__pycache__/**,**/.terraform/**,**/coverage/**,**/.pytest_cache/**,**/playwright-report/**,**/test-results/**,**/.turbo/**

# (Optionnel) chemins de coverage si vous les générez
sonar.javascript.lcov.reportPaths=coverage/lcov.info,app-landing/coverage/lcov.info,app-webapp/coverage/lcov.info,app-admin/coverage/lcov.info
sonar.python.coverage.reportPaths=coverage.xml,app-api/coverage.xml

# Réduire le bruit sur les tests si besoin
sonar.test.inclusions=**/*test*/**,**/*spec*/**,**/tests/**
