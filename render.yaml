services:
  - type: web
    name: praedixa-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: '["https://app.praedixa.com","https://admin.praedixa.com"]'
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: "3.12"
      # Key Management — must be "scaleway" in production (config.py enforces this)
      - key: KEY_PROVIDER
        value: scaleway
      - key: SCW_SECRET_KEY
        sync: false
      - key: SCW_DEFAULT_PROJECT_ID
        sync: false
      - key: SCW_REGION
        value: fr-par
      # Rate limiting — Redis URI for distributed rate limiting in production
      - key: RATE_LIMIT_STORAGE_URI
        sync: false
