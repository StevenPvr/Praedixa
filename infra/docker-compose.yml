# Praedixa — Local development stack
# Usage: docker compose up -d
#
# Services:
#   postgres  — PostgreSQL 16 (port 5433 externally to avoid conflicts)
#   api       — TypeScript API runtime (port 8000)
#   auth      — Keycloak local avec realm Praedixa importe (port 8081)
#
# The webapp (Next.js) runs outside Docker via `pnpm dev:webapp`
# because Node.js hot reload is faster natively.

services:
  auth:
    build:
      context: ..
      dockerfile: infra/auth/Dockerfile.scaleway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8081:8080"
    environment:
      KC_CACHE: local
      KC_HOSTNAME: http://localhost:8081
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_LOCAL_URL: http://127.0.0.1:8080
      KEYCLOAK_REALM: praedixa
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-kcadmin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@praedixa.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      SUPER_ADMIN_REQUIRE_TOTP: ${SUPER_ADMIN_REQUIRE_TOTP:-false}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_SMTP_FROM:-}
      KEYCLOAK_SMTP_REPLY_TO: ${KEYCLOAK_SMTP_REPLY_TO:-}
      KEYCLOAK_SMTP_PASSWORD: ${KEYCLOAK_SMTP_PASSWORD:-}
    volumes:
      - keycloak_data:/opt/keycloak/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: praedixa
      POSTGRES_PASSWORD: praedixa_local_dev_pg_2026
      POSTGRES_DB: praedixa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praedixa -d praedixa"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: app-api-ts/Dockerfile
      target: runtime
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8000

volumes:
  pgdata:
    driver: local
  keycloak_data:
    driver: local
