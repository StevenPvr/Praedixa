# Praedixa — Local development stack
# Usage: docker compose up -d
#
# Services:
#   postgres  — PostgreSQL 16 (port 5433 externally to avoid conflicts)
#   api       — TypeScript API runtime (port 8000)
#
# The webapp (Next.js) runs outside Docker via `pnpm dev:webapp`
# because Node.js hot reload is faster natively.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: praedixa
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: praedixa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praedixa -d praedixa"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: app-api-ts/Dockerfile
      target: runtime
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8000

volumes:
  pgdata:
    driver: local
