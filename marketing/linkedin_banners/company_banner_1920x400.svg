    </text>
    <text x="0" y="78" fill="#ffffff" font-size="68" font-weight="800" letter-spacing="-0.03em">
      Prévoir les effectifs,
    </text>
    <text x="0" y="156" fill="#dcb56a" font-size="68" font-weight="800" letter-spacing="-0.03em">
      Piloter chaque service.
    </text>
    <text x="0" y="208" fill="#c5d2ef" font-size="25" font-weight="500" letter-spacing="-0.006em">
