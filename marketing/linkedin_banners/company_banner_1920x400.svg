    </text>
  </g>

  <g transform="translate(1290, 24)">
    <rect x="0" y="0" width="536" height="62" rx="31" fill="rgba(16, 24, 43, 0.35)" stroke="rgba(184, 138, 47, 0.42)" stroke-width="1" />
    <rect x="1" y="1" width="534" height="60" rx="30" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="0.8" />
    <g transform="translate(30, 39)">
      <circle cx="0" cy="-7" r="5" fill="#b88a2f" />
      <text x="18" y="0" fill="#f8fbff" font-size="19" font-weight="600" letter-spacing="0em">
