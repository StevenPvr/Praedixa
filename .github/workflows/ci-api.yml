name: CI - API

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-api-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  changes:
    name: Detect API-impacting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
      reason: ${{ steps.filter.outputs.reason }}
      data_engine_relevant: ${{ steps.filter.outputs.data_engine_relevant }}
      data_engine_reason: ${{ steps.filter.outputs.data_engine_reason }}
      architecture_relevant: ${{ steps.filter.outputs.architecture_relevant }}
      architecture_reason: ${{ steps.filter.outputs.architecture_reason }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - id: filter
        name: Evaluate scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          ./scripts/ci-evaluate-scope.sh \
            --workflow api \
            --event-name "$EVENT_NAME" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --output-path "$GITHUB_OUTPUT" \
            --changed-files-path changed-files.txt

  no_relevant_changes:
    name: API scope not impacted
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.relevant != 'true'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Explain skip
        run: |
          echo "Skipping API heavy checks."
          echo "reason=${{ needs.changes.outputs.reason }}"

  api_ts_checks:
    name: API TS - Lint, typecheck, tests, build
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Performance budgets
        run: pnpm performance:validate-budgets

      - name: Architecture guards
        run: pnpm gate:architecture:api

      - name: Shared contract types - lint
        run: pnpm --filter @praedixa/shared-types lint

      - name: Shared contract types - typecheck
        run: pnpm --filter @praedixa/shared-types typecheck

      - name: Shared contract types - tests
        run: pnpm --filter @praedixa/shared-types test -- src/__tests__/public-contract.test.ts

      - name: Shared contract types - build
        run: pnpm --filter @praedixa/shared-types build

      - name: Telemetry package - lint
        run: pnpm --filter @praedixa/telemetry lint

      - name: Telemetry package - typecheck
        run: pnpm --filter @praedixa/telemetry typecheck

      - name: Telemetry package - tests
        run: pnpm --filter @praedixa/telemetry test

      - name: Telemetry package - build
        run: pnpm --filter @praedixa/telemetry build

      - name: Lint
        run: pnpm --filter @praedixa/api-ts lint

      - name: Typecheck
        run: pnpm --filter @praedixa/api-ts typecheck

      - name: Unit tests
        run: pnpm --filter @praedixa/api-ts test

      - name: Build
        run: pnpm --filter @praedixa/api-ts build

  data_engine_checks:
    name: Data engine - Ruff, MyPy, pytest, pip-audit
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.data_engine_relevant == 'true'
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install dependencies
        run: |
          cd app-api
          uv sync --frozen --extra dev

      - name: Import-linter
        run: |
          ./scripts/ci-python-tool.sh --cwd app-api import-linter --config .importlinter

      - name: Alembic heads
        run: ./scripts/check-alembic-heads.sh

      - name: Ruff check
        run: |
          cd app-api
          uv run ruff check app scripts tests

      - name: MyPy
        run: |
          cd app-api
          uv run mypy app

      - name: Unit tests
        run: |
          cd app-api
          uv run pytest tests/ -v --tb=short

      - name: Dependency audit
        run: |
          cd app-api
          uv run pip-audit --skip-editable

  architecture_guards:
    name: API runtime architecture guards
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.architecture_relevant == 'true' && needs.changes.outputs.relevant != 'true'
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Runtime dependency boundaries
        run: pnpm gate:architecture:api

  required:
    name: API - Required
    runs-on: ubuntu-latest
    needs:
      - changes
      - no_relevant_changes
      - api_ts_checks
      - data_engine_checks
      - architecture_guards
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Enforce required status
        env:
          RELEVANT: ${{ needs.changes.outputs.relevant }}
          REASON: ${{ needs.changes.outputs.reason }}
          DATA_ENGINE_RELEVANT: ${{ needs.changes.outputs.data_engine_relevant }}
          DATA_ENGINE_REASON: ${{ needs.changes.outputs.data_engine_reason }}
          ARCHITECTURE_RELEVANT: ${{ needs.changes.outputs.architecture_relevant }}
          ARCHITECTURE_REASON: ${{ needs.changes.outputs.architecture_reason }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          SKIP_RESULT: ${{ needs.no_relevant_changes.result }}
          API_TS_RESULT: ${{ needs.api_ts_checks.result }}
          DATA_ENGINE_RESULT: ${{ needs.data_engine_checks.result }}
          ARCHITECTURE_RESULT: ${{ needs.architecture_guards.result }}
        run: |
          set -euo pipefail

          echo "relevant=$RELEVANT"
          echo "reason=$REASON"
          echo "data_engine_relevant=$DATA_ENGINE_RELEVANT"
          echo "data_engine_reason=$DATA_ENGINE_REASON"
          echo "architecture_relevant=$ARCHITECTURE_RELEVANT"
          echo "architecture_reason=$ARCHITECTURE_REASON"
          echo "changes=$CHANGES_RESULT"
          echo "skip=$SKIP_RESULT"
          echo "api_ts=$API_TS_RESULT"
          echo "data_engine=$DATA_ENGINE_RESULT"
          echo "architecture=$ARCHITECTURE_RESULT"

          [[ "$CHANGES_RESULT" == "success" ]] || exit 1

          if [[ "$ARCHITECTURE_RELEVANT" == "true" && "$RELEVANT" != "true" ]]; then
            [[ "$ARCHITECTURE_RESULT" == "success" ]] || exit 1
          fi

          if [[ "$RELEVANT" == "true" ]]; then
            [[ "$API_TS_RESULT" == "success" ]] || exit 1
          fi

          if [[ "$DATA_ENGINE_RELEVANT" == "true" ]]; then
            [[ "$DATA_ENGINE_RESULT" == "success" ]] || exit 1
          fi

          if [[ "$RELEVANT" == "true" || "$DATA_ENGINE_RELEVANT" == "true" ]]; then
            exit 0
          fi

          [[ "$SKIP_RESULT" == "success" ]] || exit 1
