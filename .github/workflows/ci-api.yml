name: CI — API

on:
  workflow_dispatch:

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  DISABLE_ALL_GITHUB_VERIFICATIONS: "true"

permissions:
  contents: read

jobs:
  minutes_guard:
    name: Verifications guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_heavy: ${{ steps.guard.outputs.run_heavy }}
      reason: ${{ steps.guard.outputs.reason }}
      source: ${{ steps.guard.outputs.source }}
    steps:
      - id: guard
        uses: ./.github/actions/minutes-guard
        env:
          DISABLE_ALL_GITHUB_VERIFICATIONS: ${{ env.DISABLE_ALL_GITHUB_VERIFICATIONS }}

  minutes_graceful_skip:
    name: Graceful skip (verifications disabled)
    runs-on: ubuntu-latest
    needs: [minutes_guard]
    if: needs.minutes_guard.outputs.run_heavy != 'true'
    permissions:
      contents: read
    steps:
      - name: Explain graceful skip
        run: |
          echo "All API verifications are disabled by global switch."
          echo "reason=${{ needs.minutes_guard.outputs.reason }}"
          echo "source=${{ needs.minutes_guard.outputs.source }}"

  api_ts_checks:
    name: API TS — Lint/Type/Test/Build
    runs-on: ubuntu-latest
    needs: [minutes_guard]
    if: needs.minutes_guard.outputs.run_heavy == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @praedixa/api-ts lint

      - name: Typecheck
        run: pnpm --filter @praedixa/api-ts typecheck

      - name: Unit tests
        run: pnpm --filter @praedixa/api-ts test

      - name: Build
        run: pnpm --filter @praedixa/api-ts build

  data_engine_checks:
    name: Data Engine Python — Lint/Test/Audit
    runs-on: ubuntu-latest
    needs: [minutes_guard]
    if: needs.minutes_guard.outputs.run_heavy == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd app-api
          uv sync --extra dev

      - name: Ruff check
        run: |
          cd app-api
          uv run ruff check app scripts tests

      - name: Unit tests
        run: |
          cd app-api
          uv run pytest tests/ -v --tb=short

      - name: Dependency audit
        run: |
          cd app-api
          uv run pip-audit --skip-editable
