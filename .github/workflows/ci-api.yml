name: CI — API

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/api

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check (lint)
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short
        env:
          # Dummy values — unit tests don't connect to a real DB
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          SUPABASE_JWT_SECRET: test-secret
          SUPABASE_URL: https://test.supabase.co

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install bandit
        run: uv pip install bandit

      - name: Run bandit security scan
        # -lll = fail on HIGH and CRITICAL severity only
        run: uv run bandit -r app/ -lll --quiet

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Audit Python dependencies
        # --strict fails on ANY known vulnerability, --desc on shows advisory details
        run: uv run pip-audit --strict --desc on

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: praedixa
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: praedixa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U praedixa -d praedixa_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
          --health-start-period=10s
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check for integration tests
        id: check
        run: |
          if [ -d "tests/integration" ] && [ "$(find tests/integration -name 'test_*.py' | head -1)" ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No integration tests found yet — skipping"
          fi

      - name: Run Alembic migrations
        if: steps.check.outputs.has_tests == 'true'
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://praedixa:changeme@localhost:5432/praedixa_test

      - name: Run integration tests
        if: steps.check.outputs.has_tests == 'true'
        run: uv run pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://praedixa:changeme@localhost:5432/praedixa_test
          SUPABASE_JWT_SECRET: test-secret
          SUPABASE_URL: https://test.supabase.co
