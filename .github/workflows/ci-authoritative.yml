name: CI - Autorite

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-authoritative-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  authoritative_gate:
    name: Autorite - Gate exhaustif signe
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install system prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Install repository dependencies
        run: |
          pnpm install --frozen-lockfile
          cd app-api
          uv sync --all-groups --locked

      - name: Setup CodeQL CLI
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install CI security toolchain
        run: bash ./scripts/ci/install-authoritative-toolchain.sh

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run authoritative CI gate
        env:
          CI: "1"
          GITHUB_SHA: ${{ github.sha }}
        run: bash ./scripts/ci/run-authoritative-ci.sh

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports-${{ github.sha }}
          path: |
            .git/gate-reports/**
            playwright-report/**
            test-results/**
          if-no-files-found: ignore
          retention-days: 14

  required:
    name: Autorite - Required
    runs-on: ubuntu-latest
    needs:
      - authoritative_gate
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Enforce required status
        env:
          AUTHORITATIVE_RESULT: ${{ needs.authoritative_gate.result }}
        run: |
          set -euo pipefail
          echo "authoritative=${AUTHORITATIVE_RESULT}"
          [[ "${AUTHORITATIVE_RESULT}" == "success" ]]
