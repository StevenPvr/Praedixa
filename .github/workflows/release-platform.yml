name: Release - Platform

on:
  workflow_dispatch:

concurrency:
  group: release-platform-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"
  SCW_CLI_VERSION: "v2.51.0"
  RELEASE_BUILD_SERVICES: "landing,webapp,admin,api,auth"
  RELEASE_STAGING_SERVICES: "landing,webapp,admin,api"
  RELEASE_PROD_SERVICES: "landing,webapp,admin,api,auth"
  RELEASE_DATABASE_IMPACT: "true"

permissions:
  contents: read

jobs:
  authoritative_gate:
    name: Release - Autorite prealable
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.9

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install system prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Install repository dependencies
        run: |
          pnpm install --frozen-lockfile
          cd app-api
          uv sync --all-groups --locked

      - name: Setup CodeQL CLI
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install CI security toolchain
        run: bash ./scripts/ci/install-authoritative-toolchain.sh

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run authoritative CI gate
        env:
          CI: "1"
        run: bash ./scripts/ci/run-authoritative-ci.sh

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports-${{ github.run_id }}
          path: |
            .git/gate-reports/**
            playwright-report/**
            test-results/**
          if-no-files-found: ignore
          retention-days: 14

  build_manifest:
    name: Release - Build et manifest signe
    runs-on: ubuntu-latest
    needs: [authoritative_gate]
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.9

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install system prerequisites
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Install repository dependencies
        run: |
          pnpm install --frozen-lockfile
          cd app-api
          uv sync --all-groups --locked

      - name: Install CI security toolchain
        run: bash ./scripts/ci/install-authoritative-toolchain.sh

      - name: Install Scaleway CLI
        uses: scaleway/action-scw@v0
        with:
          version: ${{ env.SCW_CLI_VERSION }}

      - name: Docker login to Scaleway registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Configure Scaleway CLI
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.config/scw"
          cat > "${HOME}/.config/scw/config.yaml" <<EOF
          access_key: ${SCW_ACCESS_KEY}
          secret_key: ${SCW_SECRET_KEY}
          default_organization_id: ${SCW_DEFAULT_ORGANIZATION_ID}
          default_project_id: ${SCW_DEFAULT_PROJECT_ID}
          default_region: fr-par
          default_zone: fr-par-1
          send_telemetry: false
          EOF

      - name: Materialize release signing key
        env:
          PRAEDIXA_RELEASE_KEY: ${{ secrets.PRAEDIXA_RELEASE_MANIFEST_KEY }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.praedixa"
          printf '%s' "${PRAEDIXA_RELEASE_KEY}" > "${HOME}/.praedixa/release-manifest.key"
          chmod 0600 "${HOME}/.praedixa/release-manifest.key"

      - name: Download authoritative gate reports
        uses: actions/download-artifact@v4.1.3
        with:
          name: gate-reports-${{ github.run_id }}
          path: .

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          release_tag="rel-${GITHUB_RUN_ID}-${GITHUB_SHA::12}"
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"

      - name: Build signed release candidate
        env:
          SERVICES: ${{ env.RELEASE_BUILD_SERVICES }}
          REF: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          REGISTRY_PREFIX: ${{ secrets.SCW_CONTAINER_REGISTRY_PREFIX }}
          DATABASE_IMPACT: ${{ env.RELEASE_DATABASE_IMPACT }}
          API_BACKUP_INSTANCE_ID: ${{ secrets.SCW_RDB_API_PROD_INSTANCE_ID }}
          API_BACKUP_DATABASE_NAME: ${{ secrets.SCW_RDB_API_PROD_DATABASE_NAME }}
          AUTH_BACKUP_INSTANCE_ID: ${{ secrets.SCW_RDB_AUTH_PROD_INSTANCE_ID }}
          AUTH_BACKUP_DATABASE_NAME: ${{ secrets.SCW_RDB_AUTH_PROD_DATABASE_NAME }}
        run: |
          set -euo pipefail
          mkdir -p .meta/release
          gate_report="$(find .git/gate-reports -maxdepth 1 -type f -name '*.json' | head -n1)"
          if [[ -z "${gate_report}" ]]; then
            echo "Missing signed gate report artifact" >&2
            exit 1
          fi
          manifest_path=".meta/release/release-manifest.json"
          artifact_dir=".git/gate-reports/artifacts"
          backup_args=()

          if [[ "${DATABASE_IMPACT}" == "true" ]]; then
            api_backup_dir=".meta/release/backup-api"
            auth_backup_dir=".meta/release/backup-auth"
            ./scripts/scw/scw-rdb-backup-evidence.sh \
              --instance-id "${API_BACKUP_INSTANCE_ID}" \
              --database-name "${API_BACKUP_DATABASE_NAME}" \
              --output-dir "${api_backup_dir}"
            ./scripts/scw/scw-rdb-backup-evidence.sh \
              --instance-id "${AUTH_BACKUP_INSTANCE_ID}" \
              --database-name "${AUTH_BACKUP_DATABASE_NAME}" \
              --output-dir "${auth_backup_dir}"
            backup_args+=(
              --database-impact
              --backup-evidence "${api_backup_dir}/summary.json"
              --backup-evidence "${auth_backup_dir}/summary.json"
            )
          fi

          ./scripts/run-supply-chain-audit.sh

          IFS=',' read -r -a service_list <<<"${SERVICES}"
          image_args=()
          for raw_service in "${service_list[@]}"; do
            service="$(printf '%s' "${raw_service}" | xargs)"
            [[ -n "${service}" ]] || continue
            output_path=".meta/release/${service}.json"
            ./scripts/scw/scw-release-build.sh \
              --service "${service}" \
              --ref "${REF}" \
              --tag "${RELEASE_TAG}" \
              --registry-prefix "${REGISTRY_PREFIX}" \
              --output "${output_path}"
            image_args+=(--image "${service}=$(jq -r '.registry_image' "${output_path}")")
          done

          ./scripts/scw/scw-release-manifest-create.sh \
            --ref "${REF}" \
            --gate-report "${gate_report}" \
            --output "${manifest_path}" \
            --supply-chain-evidence "${artifact_dir}/supply-chain-evidence.json" \
            "${backup_args[@]}" \
            "${image_args[@]}"

          ./scripts/release-manifest-verify.sh --manifest "${manifest_path}"

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ github.run_id }}
          path: |
            .meta/release/**
            .git/gate-reports/artifacts/**
          retention-days: 14

  deploy_staging:
    name: Release - Deploy staging
    runs-on: ubuntu-latest
    needs: [build_manifest]
    timeout-minutes: 60
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Scaleway CLI
        uses: scaleway/action-scw@v0
        with:
          version: ${{ env.SCW_CLI_VERSION }}

      - name: Configure Scaleway CLI
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.config/scw"
          cat > "${HOME}/.config/scw/config.yaml" <<EOF
          access_key: ${SCW_ACCESS_KEY}
          secret_key: ${SCW_SECRET_KEY}
          default_organization_id: ${SCW_DEFAULT_ORGANIZATION_ID}
          default_project_id: ${SCW_DEFAULT_PROJECT_ID}
          default_region: fr-par
          default_zone: fr-par-1
          send_telemetry: false
          EOF

      - name: Materialize release signing key
        env:
          PRAEDIXA_RELEASE_KEY: ${{ secrets.PRAEDIXA_RELEASE_MANIFEST_KEY }}
          WEBAPP_SMOKE_COOKIE: ${{ secrets.WEBAPP_SMOKE_COOKIE }}
          ADMIN_SMOKE_COOKIE: ${{ secrets.ADMIN_SMOKE_COOKIE }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.praedixa" .meta/release
          printf '%s' "${PRAEDIXA_RELEASE_KEY}" > "${HOME}/.praedixa/release-manifest.key"
          chmod 0600 "${HOME}/.praedixa/release-manifest.key"
          printf '%s' "${WEBAPP_SMOKE_COOKIE}" > .meta/release/webapp.cookie
          printf '%s' "${ADMIN_SMOKE_COOKIE}" > .meta/release/admin.cookie
          chmod 0600 .meta/release/webapp.cookie .meta/release/admin.cookie

      - name: Download release candidate
        uses: actions/download-artifact@v4.1.3
        with:
          name: release-candidate-${{ github.run_id }}
          path: .

      - name: Preflight, deploy and smoke staging
        env:
          SERVICES: ${{ env.RELEASE_STAGING_SERVICES }}
          STAGING_AUTH_URL: ${{ secrets.STAGING_AUTH_URL }}
        run: |
          set -euo pipefail
          manifest_path=".meta/release/release-manifest.json"
          ./scripts/scw/scw-preflight-deploy.sh staging
          ./scripts/scw/scw-release-deploy.sh --manifest "${manifest_path}" --env staging --services "${SERVICES}"
          ./scripts/scw/scw-post-deploy-smoke.sh \
            --env staging \
            --services "${SERVICES}" \
            --auth-url "${STAGING_AUTH_URL}" \
            --webapp-session-cookie-file .meta/release/webapp.cookie \
            --admin-session-cookie-file .meta/release/admin.cookie

  promote_prod:
    name: Release - Promote prod
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    timeout-minutes: 60
    environment: prod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Scaleway CLI
        uses: scaleway/action-scw@v0
        with:
          version: ${{ env.SCW_CLI_VERSION }}

      - name: Configure Scaleway CLI
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.config/scw"
          cat > "${HOME}/.config/scw/config.yaml" <<EOF
          access_key: ${SCW_ACCESS_KEY}
          secret_key: ${SCW_SECRET_KEY}
          default_organization_id: ${SCW_DEFAULT_ORGANIZATION_ID}
          default_project_id: ${SCW_DEFAULT_PROJECT_ID}
          default_region: fr-par
          default_zone: fr-par-1
          send_telemetry: false
          EOF

      - name: Materialize release signing key
        env:
          PRAEDIXA_RELEASE_KEY: ${{ secrets.PRAEDIXA_RELEASE_MANIFEST_KEY }}
          WEBAPP_SMOKE_COOKIE: ${{ secrets.WEBAPP_SMOKE_COOKIE }}
          ADMIN_SMOKE_COOKIE: ${{ secrets.ADMIN_SMOKE_COOKIE }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.praedixa" .meta/release
          printf '%s' "${PRAEDIXA_RELEASE_KEY}" > "${HOME}/.praedixa/release-manifest.key"
          chmod 0600 "${HOME}/.praedixa/release-manifest.key"
          printf '%s' "${WEBAPP_SMOKE_COOKIE}" > .meta/release/webapp.cookie
          printf '%s' "${ADMIN_SMOKE_COOKIE}" > .meta/release/admin.cookie
          chmod 0600 .meta/release/webapp.cookie .meta/release/admin.cookie

      - name: Download release candidate
        uses: actions/download-artifact@v4.1.3
        with:
          name: release-candidate-${{ github.run_id }}
          path: .

      - name: Preflight, promote and smoke prod
        env:
          SERVICES: ${{ env.RELEASE_PROD_SERVICES }}
        run: |
          set -euo pipefail
          manifest_path=".meta/release/release-manifest.json"
          ./scripts/scw/scw-preflight-deploy.sh prod
          ./scripts/scw/scw-release-promote.sh --manifest "${manifest_path}" --to prod --services "${SERVICES}"
          ./scripts/scw/scw-post-deploy-smoke.sh \
            --env prod \
            --services "${SERVICES}" \
            --webapp-session-cookie-file .meta/release/webapp.cookie \
            --admin-session-cookie-file .meta/release/admin.cookie
