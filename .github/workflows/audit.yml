name: Audit (Ultra-Strict)

on:
  pull_request:
  push:
    branches: ["main"]
  merge_group:
  schedule:
    # Tous les jours à 03:17 Paris environ (02:17 UTC hors DST)
    - cron: "17 2 * * *"

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect stack
    runs-on: ubuntu-24.04
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      node_dir: ${{ steps.detect.outputs.node_dir }}
      node_pm: ${{ steps.detect.outputs.node_pm }}
      has_python: ${{ steps.detect.outputs.has_python }}
      python_dir: ${{ steps.detect.outputs.python_dir }}
      python_tool: ${{ steps.detect.outputs.python_tool }}
      has_terraform: ${{ steps.detect.outputs.has_terraform }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect project layout
        shell: bash
        run: |
          set -euo pipefail

          has_node=false
          node_dir=""
          node_pm="npm"
          if [[ -f "pnpm-workspace.yaml" && -f "package.json" ]]; then
            has_node=true; node_dir="."
          elif [[ -f "frontend/package.json" ]]; then
            has_node=true; node_dir="frontend"
          elif [[ -f "web/package.json" ]]; then
            has_node=true; node_dir="web"
          elif [[ -f "app-webapp/package.json" || -f "app-landing/package.json" || -f "app-admin/package.json" ]]; then
            has_node=true; node_dir="."
          elif [[ -f "package.json" ]]; then
            has_node=true; node_dir="."
          fi

          if [[ "$has_node" == "true" ]]; then
            if [[ "$node_dir" == "." ]]; then
              if [[ -f "pnpm-lock.yaml" ]]; then
                node_pm="pnpm"
              elif [[ -f "package-lock.json" ]]; then
                node_pm="npm"
              fi
            else
              if [[ -f "$node_dir/pnpm-lock.yaml" ]]; then
                node_pm="pnpm"
              elif [[ -f "$node_dir/package-lock.json" ]]; then
                node_pm="npm"
              fi
            fi
          fi

          has_python=false
          python_dir=""
          python_tool="pip"
          if [[ -f "app-api/pyproject.toml" || -f "app-api/requirements.txt" ]]; then
            has_python=true; python_dir="app-api"
          elif [[ -f "backend/pyproject.toml" || -f "backend/requirements.txt" ]]; then
            has_python=true; python_dir="backend"
          elif [[ -f "pyproject.toml" || -f "requirements.txt" ]]; then
            has_python=true; python_dir="."
          fi

          if [[ "$has_python" == "true" && -f "$python_dir/uv.lock" ]]; then
            python_tool="uv"
          fi

          has_terraform=false
          if find . -type f -name "*.tf" -not -path "*/.terraform/*" | grep -q .; then
            has_terraform=true
          fi

          has_dockerfile=false
          if [[ -f "Dockerfile" ]] || find . -maxdepth 3 -type f -iname "dockerfile" | grep -q .; then
            has_dockerfile=true
          fi

          echo "has_node=$has_node" >> "$GITHUB_OUTPUT"
          echo "node_dir=$node_dir" >> "$GITHUB_OUTPUT"
          echo "node_pm=$node_pm" >> "$GITHUB_OUTPUT"
          echo "has_python=$has_python" >> "$GITHUB_OUTPUT"
          echo "python_dir=$python_dir" >> "$GITHUB_OUTPUT"
          echo "python_tool=$python_tool" >> "$GITHUB_OUTPUT"
          echo "has_terraform=$has_terraform" >> "$GITHUB_OUTPUT"
          echo "has_dockerfile=$has_dockerfile" >> "$GITHUB_OUTPUT"

  secrets:
    name: Secrets (Gitleaks + Trivy)
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history for secrets)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (history + working tree)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: >
            detect
            --source .
            --report-format sarif
            --report-path gitleaks.sarif
            --redact
            --config .gitleaks.toml

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Trivy secrets scan (repo)
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif
          exit-code: "1"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          limit-severities-for-sarif: true
          trivyignores: ".trivyignore"
          hide-progress: true

      - name: Upload Trivy secrets SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: secrets-reports
          path: |
            gitleaks.sarif
            trivy-secrets.sarif

  sast:
    name: SAST (Semgrep + Bandit)
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (for tools)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Semgrep + Bandit
        run: |
          python -m pip install --upgrade pip
          pip install semgrep==1.* bandit==1.*

      - name: Semgrep (auto ruleset, fail on ANY finding)
        run: |
          set -euo pipefail
          semgrep scan \
            --config auto \
            --error \
            --sarif-output semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Bandit (Python security lint)
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.python_dir }}" == "app-api" && -d "app" ]]; then
            bandit -r app -f json -o bandit.json
          else
            bandit -r . -f json -o bandit.json
          fi
          python - <<'PY'
          import json
          import sys

          data = json.load(open("bandit.json", "r", encoding="utf-8"))
          issues = data.get("results", [])
          if issues:
              print(f"Bandit findings: {len(issues)}")
              for issue in issues[:20]:
                  print(
                      f"- {issue.get('test_id')} "
                      f"{issue.get('issue_severity')}/{issue.get('issue_confidence')}: "
                      f"{issue.get('issue_text')} "
                      f"({issue.get('filename')}:{issue.get('line_number')})"
                  )
              sys.exit(1)
          print("Bandit: 0 findings")
          PY

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sast-reports
          if-no-files-found: ignore
          path: |
            semgrep.sarif
            ${{ needs.detect.outputs.python_dir }}/bandit.json

  osv_pr:
    name: OSV Scanner (PR diff)
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3
    permissions:
      contents: read
      security-events: write
      actions: read

  osv_full:
    name: OSV Scanner (full, scheduled/push)
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3
    permissions:
      contents: read
      security-events: write
      actions: read

  dependencies:
    name: SCA (Trivy vuln + pnpm/npm + pip audit)
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy vulnerabilities (repo, ultra-strict)
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-vuln.sarif
          exit-code: "1"
          ignore-unfixed: false
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          limit-severities-for-sarif: true
          trivyignores: ".trivyignore"
          hide-progress: true

      - name: Upload Trivy vuln SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-vuln.sarif
          category: trivy-vuln

      - name: Setup pnpm
        if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.node_pm == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node (pnpm)
        if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.node_pm == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            ${{ needs.detect.outputs.node_dir }}/pnpm-lock.yaml

      - name: Setup Node (npm)
        if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.node_pm == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ needs.detect.outputs.node_dir }}/package-lock.json

      - name: Node install (for audit)
        if: needs.detect.outputs.has_node == 'true'
        working-directory: ${{ needs.detect.outputs.node_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.node_pm }}" == "pnpm" ]]; then
            pnpm install --frozen-lockfile
          else
            if [[ -f package-lock.json ]]; then npm ci; else npm install; fi
          fi

      - name: Node audit (fail on ANY)
        if: needs.detect.outputs.has_node == 'true'
        working-directory: ${{ needs.detect.outputs.node_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.node_pm }}" == "pnpm" ]]; then
            pnpm audit --audit-level=low
          else
            npm audit --audit-level=low
          fi

      - name: Setup Python
        if: needs.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup uv
        if: needs.detect.outputs.has_python == 'true' && needs.detect.outputs.python_tool == 'uv'
        uses: astral-sh/setup-uv@v4

      - name: Install backend deps (best-effort)
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.python_tool }}" == "uv" && -f "uv.lock" ]]; then
            uv sync --extra dev || uv sync
            uv pip install pip-audit==2.*
          else
            python -m pip install --upgrade pip
            if [[ -f "requirements.txt" ]]; then
              pip install -r requirements.txt
            elif [[ -f "pyproject.toml" ]]; then
              pip install ".[dev]" || pip install .
            fi
            pip install pip-audit==2.*
          fi

      - name: pip-audit (fail on ANY)
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.python_tool }}" == "uv" && -f "uv.lock" ]]; then
            uv run pip-audit
          elif [[ -f "requirements.txt" ]]; then
            pip-audit -r requirements.txt
          else
            pip-audit
          fi

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-reports
          path: |
            trivy-vuln.sarif

  policy_iac:
    name: IaC + CI/CD Policy (Checkov + Trivy misconfig)
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov (Terraform + GitHub Actions + Dockerfile)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,github_actions,dockerfile
          config_file: .checkov.yml
          output_format: sarif
          output_file_path: checkov.sarif
          quiet: true
          soft_fail: false

      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov

      - name: Trivy misconfig (repo)
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: config
          scan-ref: .
          scanners: misconfig
          format: sarif
          output: trivy-misconfig.sarif
          exit-code: "1"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          limit-severities-for-sarif: true
          hide-progress: true

      - name: Upload Trivy misconfig SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-misconfig.sarif
          category: trivy-misconfig

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: iac-policy-reports
          path: |
            checkov.sarif
            trivy-misconfig.sarif

  terraform_quality:
    name: Terraform quality (fmt/validate/tflint)
    if: needs.detect.outputs.has_terraform == 'true'
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: terraform fmt (check)
        run: |
          set -euo pipefail
          terraform fmt -check -recursive

      - name: terraform validate (per directory, backend disabled)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t DIRS < <(find . -type f -name "*.tf" -not -path "*/.terraform/*" -print0 | xargs -0 -n1 dirname | sort -u)
          for d in "${DIRS[@]}"; do
            echo "==> validate in $d"
            (
              cd "$d"
              terraform init -backend=false -upgrade=false -input=false >/dev/null
              terraform validate
            )
          done

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
          cache: true
          tflint_config_path: "**/.tflint.hcl"

      - name: tflint (init)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tflint --init

      - name: tflint (recursive, fail on ANY)
        run: |
          set -euo pipefail
          tflint --recursive -f compact

  quality:
    name: Code quality (Node monorepo + Python)
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.node_pm == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node (pnpm)
        if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.node_pm == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            ${{ needs.detect.outputs.node_dir }}/pnpm-lock.yaml

      - name: Setup Node (npm)
        if: needs.detect.outputs.has_node == 'true' && needs.detect.outputs.node_pm == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ needs.detect.outputs.node_dir }}/package-lock.json

      - name: Frontend install
        if: needs.detect.outputs.has_node == 'true'
        working-directory: ${{ needs.detect.outputs.node_dir }}
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "true"
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.node_pm }}" == "pnpm" ]]; then
            pnpm install --frozen-lockfile
          else
            if [[ -f package-lock.json ]]; then npm ci; else npm install; fi
          fi

      - name: Frontend lint (fail on warnings)
        if: needs.detect.outputs.has_node == 'true'
        working-directory: ${{ needs.detect.outputs.node_dir }}
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          CI: "true"
        run: |
          set -euo pipefail
          if node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));process.exit(p.scripts&&p.scripts.lint?0:1)"; then
            if [[ "${{ needs.detect.outputs.node_pm }}" == "pnpm" ]]; then
              pnpm lint
            else
              npm run lint --silent -- --max-warnings=0 || npm run lint --silent
            fi
          else
            echo "No lint script. Skipping."
          fi

      - name: Frontend typecheck (if present)
        if: needs.detect.outputs.has_node == 'true'
        working-directory: ${{ needs.detect.outputs.node_dir }}
        env:
          CI: "true"
        run: |
          set -euo pipefail
          if node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));process.exit(p.scripts&&p.scripts.typecheck?0:1)"; then
            if [[ "${{ needs.detect.outputs.node_pm }}" == "pnpm" ]]; then
              pnpm typecheck
            else
              npm run typecheck --silent
            fi
          else
            echo "No typecheck script. Skipping."
          fi

      - name: Frontend tests (if present)
        if: needs.detect.outputs.has_node == 'true'
        working-directory: ${{ needs.detect.outputs.node_dir }}
        env:
          CI: "true"
        run: |
          set -euo pipefail
          if node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));process.exit(p.scripts&&p.scripts.test?0:1)"; then
            if [[ "${{ needs.detect.outputs.node_pm }}" == "pnpm" ]]; then
              pnpm test
            else
              npm test --silent
            fi
          else
            echo "No test script. Skipping."
          fi

      - name: Setup Python
        if: needs.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup uv
        if: needs.detect.outputs.has_python == 'true' && needs.detect.outputs.python_tool == 'uv'
        uses: astral-sh/setup-uv@v4

      - name: Install Python tooling
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.python_tool }}" == "uv" && -f "uv.lock" ]]; then
            uv sync --extra dev || uv sync
          else
            python -m pip install --upgrade pip
            if [[ -f "requirements.txt" ]]; then
              pip install -r requirements.txt
            elif [[ -f "pyproject.toml" ]]; then
              pip install ".[dev]" || pip install .
            fi
            pip install ruff==0.* mypy==1.* pytest==8.*
          fi

      - name: Ruff (lint + format check)
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.python_tool }}" == "uv" && -f "uv.lock" ]]; then
            uv run ruff check .
            uv run ruff format --check .
          else
            ruff check .
            ruff format --check .
          fi

      - name: mypy (strict)
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.detect.outputs.python_tool }}" == "uv" && -f "uv.lock" ]]; then
            uv run mypy . --strict
          else
            mypy . --strict
          fi

      - name: pytest (if tests exist)
        if: needs.detect.outputs.has_python == 'true'
        working-directory: ${{ needs.detect.outputs.python_dir }}
        run: |
          set -euo pipefail
          if find . -maxdepth 5 -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            if [[ "${{ needs.detect.outputs.python_tool }}" == "uv" && -f "uv.lock" ]]; then
              uv run pytest -q
            else
              pytest -q
            fi
          else
            echo "No pytest tests found. Skipping."
          fi

  sbom:
    name: SBOM (Syft via Anchore)
    runs-on: ubuntu-24.04
    needs: [detect]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          artifact-name: sbom.spdx.json

      - name: Upload SBOM artifact (explicit)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.spdx.json

  sonarqube:
    name: SonarQube (Quality Gate)
    runs-on: ubuntu-24.04
    needs: [detect, quality]
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip SonarQube when not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: 'echo "Skipping SonarQube: SONAR_TOKEN or SONAR_HOST_URL is missing."'

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
