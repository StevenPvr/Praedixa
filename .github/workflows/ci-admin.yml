name: CI - Admin

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-admin-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  changes:
    name: Detect admin-impacting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
      reason: ${{ steps.filter.outputs.reason }}
      architecture_relevant: ${{ steps.filter.outputs.architecture_relevant }}
      architecture_reason: ${{ steps.filter.outputs.architecture_reason }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - id: filter
        name: Evaluate scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          ./scripts/ci-evaluate-scope.sh \
            --workflow admin \
            --event-name "$EVENT_NAME" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --output-path "$GITHUB_OUTPUT" \
            --changed-files-path changed-files.txt

  no_relevant_changes:
    name: Admin scope not impacted
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.relevant != 'true'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Explain skip
        run: |
          echo "Skipping admin heavy checks."
          echo "reason=${{ needs.changes.outputs.reason }}"

  lint_typecheck:
    name: Admin - Lint and typecheck
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Architecture guards
        run: pnpm gate:architecture:frontend

      - name: Build workspace packages
        run: pnpm --filter @praedixa/shared-types build && pnpm --filter @praedixa/ui build

      - name: Format check
        run: pnpm format:check

      - name: Performance budgets
        run: pnpm performance:validate-budgets

      - name: ESLint
        run: pnpm --filter @praedixa/admin lint

      - name: TypeScript check
        run: pnpm --filter @praedixa/admin typecheck

  test:
    name: Admin - Unit tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @praedixa/shared-types build && pnpm --filter @praedixa/ui build

      - name: Run tests
        run: pnpm --filter @praedixa/admin test -- --passWithNoTests

  build:
    name: Admin - Build
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Restore Next.js build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: app-admin/.next/cache
          key: nextjs-admin-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'app-admin/**/*.ts', 'app-admin/**/*.tsx', 'app-admin/**/*.js', 'app-admin/**/*.jsx', 'app-admin/**/*.css', 'packages/shared-types/**/*.ts', 'packages/shared-types/**/*.tsx', 'packages/ui/**/*.ts', 'packages/ui/**/*.tsx', 'packages/ui/**/*.css') }}
          restore-keys: |
            nextjs-admin-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-admin-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @praedixa/shared-types build && pnpm --filter @praedixa/ui build

      - name: Build admin app
        run: pnpm --filter @praedixa/admin build

  architecture_guards:
    name: Frontend architecture guards
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.architecture_relevant == 'true' && needs.changes.outputs.relevant != 'true'
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@c336a2788d9774dccfdeb4823a5058ccc9f07453 # v4.3.0
        with:
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency boundaries and dead-code guards
        run: pnpm gate:architecture:frontend

  required:
    name: Admin - Required
    runs-on: ubuntu-latest
    needs:
      - changes
      - no_relevant_changes
      - lint_typecheck
      - test
      - build
      - architecture_guards
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Enforce required status
        env:
          RELEVANT: ${{ needs.changes.outputs.relevant }}
          REASON: ${{ needs.changes.outputs.reason }}
          ARCHITECTURE_RELEVANT: ${{ needs.changes.outputs.architecture_relevant }}
          ARCHITECTURE_REASON: ${{ needs.changes.outputs.architecture_reason }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          SKIP_RESULT: ${{ needs.no_relevant_changes.result }}
          LINT_RESULT: ${{ needs.lint_typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          ARCHITECTURE_RESULT: ${{ needs.architecture_guards.result }}
        run: |
          set -euo pipefail

          echo "relevant=$RELEVANT"
          echo "reason=$REASON"
          echo "architecture_relevant=$ARCHITECTURE_RELEVANT"
          echo "architecture_reason=$ARCHITECTURE_REASON"
          echo "changes=$CHANGES_RESULT"
          echo "skip=$SKIP_RESULT"
          echo "lint=$LINT_RESULT"
          echo "test=$TEST_RESULT"
          echo "build=$BUILD_RESULT"
          echo "architecture=$ARCHITECTURE_RESULT"

          [[ "$CHANGES_RESULT" == "success" ]] || exit 1

          if [[ "$ARCHITECTURE_RELEVANT" == "true" && "$RELEVANT" != "true" ]]; then
            [[ "$ARCHITECTURE_RESULT" == "success" ]] || exit 1
          fi

          if [[ "$RELEVANT" == "true" ]]; then
            [[ "$LINT_RESULT" == "success" ]] || exit 1
            [[ "$TEST_RESULT" == "success" ]] || exit 1
            [[ "$BUILD_RESULT" == "success" ]] || exit 1
            exit 0
          fi

          [[ "$SKIP_RESULT" == "success" ]] || exit 1
