name: "Verifications Guard"
description: "Global switch to disable all GitHub verifications gracefully."
outputs:
  run_heavy:
    description: "true when verifications should run, false when they should be skipped gracefully"
    value: ${{ steps.guard.outputs.run_heavy }}
  reason:
    description: "decision reason"
    value: ${{ steps.guard.outputs.reason }}
  source:
    description: "source used to decide"
    value: ${{ steps.guard.outputs.source }}
runs:
  using: "composite"
  steps:
    - id: guard
      shell: bash
      env:
        DISABLE_ALL_GITHUB_VERIFICATIONS: ${{ env.DISABLE_ALL_GITHUB_VERIFICATIONS }}
      run: |
        set -euo pipefail

        truthy() {
          case "${1,,}" in
            1|true|yes|on) return 0 ;;
            *) return 1 ;;
          esac
        }

        if truthy "${DISABLE_ALL_GITHUB_VERIFICATIONS:-}"; then
          echo "run_heavy=false" >> "$GITHUB_OUTPUT"
          echo "reason=disabled_by_global_switch" >> "$GITHUB_OUTPUT"
          echo "source=workflow_env" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "run_heavy=true" >> "$GITHUB_OUTPUT"
        echo "reason=enabled_by_global_switch" >> "$GITHUB_OUTPUT"
        echo "source=workflow_env" >> "$GITHUB_OUTPUT"
