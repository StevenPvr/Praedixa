<svg
  xmlns="http://www.w3.org/2000/svg"
  width="920"
  height="400"
  viewBox="0 0 920 400"
  role="img"
  aria-labelledby="logoTitleFull"
>
  <title id="logoTitleFull">Praedixa</title>

  <!-- Logo mark — scaled from 64×64 to fit ~280px, centered vertically -->
  <g transform="translate(210, 200) scale(4.4)" fill="none" stroke="#000000">
    <rect
      x="-22"
      y="-22"
      width="44"
      height="44"
      transform="rotate(45)"
      stroke-width="1.1"
    />
    <line
      x1="-10"
      y1="-14"
      x2="-10"
      y2="14"
      stroke-width="1.65"
      stroke-linecap="square"
    />
    <path
      d="M-10 -14H4C10 -14 14 -10 14 -4C14 2 10 6 4 6H-10"
      stroke-width="1.65"
      stroke-linecap="square"
      stroke-linejoin="miter"
    />
  </g>

  <!-- Wordmark -->
  <text
    x="380"
    y="215"
    font-family="'Plus Jakarta Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-3"
    fill="#000000"
  >Praedixa</text>
</svg>
