<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Industrial variant - Main Praedixa logo -->
  <!-- Outer square frame -->
  <rect x="4" y="4" width="56" height="56" stroke="#0f0f0f" stroke-width="2" fill="none"/>
  <!-- P - vertical bar -->
  <line x1="18" y1="16" x2="18" y2="48" stroke="#0f0f0f" stroke-width="3" stroke-linecap="square"/>
  <!-- P - top horizontal -->
  <line x1="18" y1="16" x2="38" y2="16" stroke="#0f0f0f" stroke-width="3" stroke-linecap="square"/>
  <!-- P - right vertical -->
  <line x1="38" y1="16" x2="38" y2="29" stroke="#0f0f0f" stroke-width="3" stroke-linecap="square"/>
  <!-- P - middle horizontal -->
  <line x1="38" y1="29" x2="18" y2="29" stroke="#0f0f0f" stroke-width="3" stroke-linecap="square"/>
  <!-- Decorative dot -->
  <circle cx="50" cy="42" r="4" fill="#0f0f0f"/>
</svg>
