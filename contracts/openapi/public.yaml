      name: alertId
      in: path
      required: true
      description: Identifier of the coverage alert or alert-backed decision.
      schema:
        type: string
    forecastId:
      name: forecastId
      in: path
      required: true
      description: Identifier of the forecast.
      schema:
        type: string
    decisionId:
      name: decisionId
      in: path
      required: true
      description: Identifier of the decision.
      schema:
        type: string
    resource:
      name: resource
      in: path
      required: true
      description: Export resource name.
      schema:
        type: string
    datasetId:
      name: datasetId
      in: path
      required: true
      description: Identifier of the dataset.
      schema:
        type: string
    convId:
      name: convId
      in: path
      required: true
      description: Identifier of the conversation.
      schema:
        type: string
  responses:
    BadRequestError:
      description: Request validation or path/query parsing failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnauthorizedError:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ForbiddenError:
      description:
        Authentication succeeded but the caller is not allowed to access
        this resource.
