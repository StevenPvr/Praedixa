default_install_hook_types:
  - pre-commit
  - pre-push
default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-yaml
        exclude: "pnpm-lock.yaml"
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: "^app-landing/public/dashboard-preview(-(?:1280|1920))?\\.(mp4|webm)$|^app-landing/public/dashboard-poster\\.jpg$|^app-landing/public/hero-video/hero-[a-z0-9-]+\\.(mp4|webm|jpg)$"
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: gate-precommit-blocking
        name: gate pre-commit blocking (security + tests)
        entry: sh -c './scripts/gate-precommit-blocking.sh'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: gate-prepush-deep
        name: gate pre-push deep security (blocking)
        entry: sh -c './scripts/gate-prepush-deep.sh'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: gate-report-verify-pre-push
        name: gate report verify (signed + fresh + HEAD-bound)
        entry: sh -c './scripts/verify-gate-report.sh --mode pre-push --run-if-missing --max-age-seconds 21600'
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
