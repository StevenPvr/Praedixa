minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
        exclude: "pnpm-lock.yaml"
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        name: actionlint (GitHub Actions)
        files: "^.github/workflows/"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit (Python security)
        args: ["-ll"]
        types: [python]

  - repo: local
    hooks:
      - id: prettier
        name: prettier (check)
        entry: pnpm exec prettier --check
        language: system
        files: "\\.(ts|tsx|js|jsx|json|md)$"

      - id: eslint
        name: eslint (check)
        entry: pnpm lint
        language: system
        types_or: [ts, tsx, javascript, jsx]
        pass_filenames: false

      - id: typecheck
        name: typescript (check)
        entry: pnpm typecheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: test
        name: vitest (check)
        entry: pnpm test
        language: system
        pass_filenames: false

      - id: build
        name: next build (check)
        entry: pnpm build
        language: system
        pass_filenames: false

      - id: audit
        name: pnpm audit (high/critical)
        entry: pnpm audit --audit-level=high
        language: system
        always_run: true
        pass_filenames: false
